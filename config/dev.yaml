app:
  name: MiguelLM
  environment: public-client
  intro_text: >-
    I'm Miguel's terminal clone. This is mildly tragic, yes, but useful. You can
    talk to me about robotics, research, PhD survival, lab memories, anime, games,
    or whatever nonsense passed peer review this week.

# Public-safe default: the terminal app talks to Miguel's private Linux backend.
# The client does not need OPENAI_API_KEY, F5-TTS paths, or voice assets.
backend:
  mode: remote
  url_env: MIGUELLM_BACKEND_URL
  url: http://127.0.0.1:8765
  token_env: MIGUELLM_BACKEND_TOKEN
  timeout_seconds: 120

input_audio:
  recorder: ffmpeg_avfoundation
  ffmpeg_bin: ffmpeg
  device: "none:0"
  record_seconds: 5
  sample_rate: 16000
  channels: 1

playback:
  player: auto
  keep_wavs: false

paths:
  persona_dir: persona
  persona_dir_env: MIGUELLM_PERSONA_DIR
  memory_dir: memory/auto
  sessions_dir: sessions
  consent_file: memory/consent.json

memory:
  enabled: false
  auto_write: false
  require_consent: true
  min_confidence: 0.55
  max_memories_per_session: 8
  redact_sensitive: true
