app:
  name: MiguelLM
  environment: public-client
  intro_text: >-
    Connected to the remote chat service. Type a message and press Enter.

backend:
  mode: remote
  url_env: MIGUELLM_BACKEND_URL
  url: https://miguellm.miguelvasco.com
  token_env: MIGUELLM_BACKEND_TOKEN
  timeout_seconds: 120

input_audio:
  recorder: ffmpeg_avfoundation
  ffmpeg_bin: ffmpeg
  device: "none:0"
  record_seconds: 5
  sample_rate: 16000
  channels: 1

playback:
  player: auto
  keep_wavs: false

paths:
  sessions_dir: sessions
  tmp_dir: tmp
